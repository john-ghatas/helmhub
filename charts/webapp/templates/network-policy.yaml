apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "helm-base.fullname" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- include "helm-base.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "helm-base.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort | default .Values.service.port }}
      # Safe fallback checks to enforce the policy even if keys are missing from values.yaml
      {{- if and .Values.networkPolicy (hasKey .Values.networkPolicy "allowOnlyFromIngress" | ternary .Values.networkPolicy.allowOnlyFromIngress false) }}
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      {{- end }}

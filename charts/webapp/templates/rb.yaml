apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "helm-base.fullname" . }}-{{ .Values.appName | default "app" }}-binding
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "helm-base.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "helm-base.fullname" . }}-{{ .Values.appName | default "app" }}-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "helm-base.fullname" . }}-{{ .Values.appName | default "app" }}-role
  apiGroup: rbac.authorization.k8s.io

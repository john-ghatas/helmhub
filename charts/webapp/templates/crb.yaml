apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "helm-base.fullname" . }}-{{ .Values.appName | default "app" }}-clusterbinding
  labels:
    {{ include "helm-base.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "helm-base.fullname" . }}-{{ .Values.appName | default "app" }}-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "helm-base.fullname" . }}-{{ .Values.appName | default "app" }}-clusterrole
  apiGroup: rbac.authorization.k8s.io

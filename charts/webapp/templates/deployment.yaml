apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helm-base.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "helm-base.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
{{- include "helm-base.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
{{- include "helm-base.selectorLabels" . | nindent 8 }}

    spec:
      {{- if .Values.podSecurityContext.enabled }}
      securityContext:
        runAsNonRoot: {{ .Values.podSecurityContext.runAsNonRoot }}
        runAsUser: {{ .Values.podSecurityContext.runAsUser }}
        fsGroup: {{ .Values.podSecurityContext.fsGroup }}
        {{- if .Values.seccompProfile.enabled }}
        seccompProfile:
          type: {{ .Values.seccompProfile.type }}
        {{- end }}
      {{- end }}

      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          {{- if .Values.containerSecurity.enabled }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.containerSecurity.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.containerSecurity.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.containerSecurity.capabilities | nindent 14 }}
          {{- end }}


          {{- with .Values.env }}
          env:
          {{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
          {{- end }}
          {{- end }}

          ports:
            - containerPort: {{ .Values.service.port }}

          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}

          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
              {{- if .Values.persistence.subPath }}
              subPath: {{ .Values.persistence.subPath | quote }}
              {{- end }}
          {{- end }}

      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "helm-base.fullname" . }}-pvc
      {{- end }}

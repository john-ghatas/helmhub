apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "helm-base.fullname" . }}-{{ .Values.appName | default "app" }}-clusterrole
  labels:
    {{ include "helm-base.labels" . | nindent 4 }}
rules:
  - apiGroups: ["cert-manager.io"]
    resources:
      - clusterissuers
    verbs: ["get", "list", "watch"]

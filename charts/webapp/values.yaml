image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

ingress:
  enabled: false

  className: traefik-internal

  host: org.ltd
  path: /
  pathType: Prefix

  annotations:
    cert-manager.io/cluster-issuer: selfsigned-issuer

  tls:
    enabled: true
    secretName: org-ltd-tls


configmaps: {}
sealed: {}

podSecurityContext:
  enabled: false
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurity:
  enabled: false
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

persistence:
  enabled: false
  size: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  pvName: ""
  subPath: ""
  nfs:
    server: "k3s-nfs"
    path: "/srv/exports"